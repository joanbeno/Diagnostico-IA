<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesión IA · ML Studio — Caja Ajustable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:      #3535cc;
      --burgundy:    #8C1C3A;
      --bg-dark:     #c3c3c3;
      --surface:     #161625;
      --border-dark: rgba(255,255,255,0.09);
      --text-light:  rgba(255,255,255,0.92);
      --text-muted:  rgba(255,255,255,0.38);
      --text-mid:    rgba(255,255,255,0.60);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark);
    }

    #session {
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: var(--text-light);
    }

    .s-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 24px;
      height: 50px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-dark);
      flex-shrink: 0;
    }

    .s-header::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;   /* ← CAMBIA "top" por "bottom" */
      height: 3px;
      background: var(--burgundy);
    }

    .s-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .s-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 14px;
      color: var(--text-light);
      white-space: nowrap;
    }

    .s-sep {
      width: 1px;
      height: 16px;
      background: var(--border-dark);
    }

    .s-slide-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      max-width: 320px;
    }

    .s-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover  { opacity: .82; }
    .btn:active { transform: scale(.97); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-dark);
      color: var(--text-light);
    }
    .btn-outline:hover { background: rgba(255,255,255,.06); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    
    .btn-expand {
      background: rgba(140,28,58,0.7);
      border: 1px solid var(--burgundy);
      color: white;
    }

    .s-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 20px 0;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border-dark);
      color: var(--text-light);
      font-size: 24px;
      cursor: pointer;
      margin: 0 14px;
      transition: background .15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.14); }
    .nav-btn:disabled { opacity: .18; cursor: default; pointer-events: none; }

    .viewer-wrap {
      position: relative;
      flex-shrink: 0;
      transition: width 0.2s ease, height 0.2s ease;
    }

    #viewer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 794px;
      height: 559px;
      border: none;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      box-shadow: 0 12px 64px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
      border-radius: 2px;
      transition: transform 0.2s ease;
    }

    .s-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      height: 42px;
      flex-shrink: 0;
      border-top: 1px solid var(--border-dark);
    }

    .slide-counter {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      min-width: 32px;
      text-align: center;
    }

    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      cursor: pointer;
      transition: background .2s;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.35);
    }

    .kbd-hint {
      font-size: 10.5px;
      color: #555555;
      display: flex;
      gap: 4px;
    }

    kbd {
      padding: 1px 5px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--border-dark);
      border-radius: 4px;
      font-size: 10px;
    }
    
    .size-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 12px;
      padding-left: 12px;
      border-left: 1px solid var(--border-dark);
    }
    
    .size-value {
      font-size: 10px;
      background: rgba(0,0,0,0.4);
      padding: 2px 8px;
      border-radius: 20px;
      font-family: monospace;
      min-width: 45px;
      text-align: center;
    }

    #print-area { display: none; }

    @media print {
      body.print-all #session { display: none !important; }
      body.print-all #print-area { display: block !important; }
      body.print-all #print-area iframe {
        width: 210mm;
        height: 148mm;
        border: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

<div id="session">
  <header class="s-header">
    <div class="s-brand">
      <span class="s-logo">ML Studio · Sesión IA</span>
      <div class="s-sep"></div>
      <span class="s-slide-title" id="slideTitle">—</span>
    </div>
    <div class="s-actions">
      <div class="size-controls">
        <button class="btn btn-outline" id="btnZoomOut" title="Reducir">−</button>
        <span class="size-value" id="zoomPercent">100%</span>
        <button class="btn btn-outline" id="btnZoomIn" title="Agrandar">+</button>
        <button class="btn btn-expand" id="btnMaxFit" title="Ajustar al ancho">📐 Ajustar</button>
      </div>
      <button class="btn btn-outline" onclick="printCurrent()">Imprimir este</button>
      <button class="btn btn-primary" onclick="printAll()">Imprimir todos</button>
    </div>
  </header>

  <main class="s-main">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">‹</button>
    <div class="viewer-wrap" id="viewerWrap">
      <iframe id="viewer" src="" title="Flyer actual"></iframe>
    </div>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">›</button>
  </main>

  <footer class="s-footer">
    <span class="slide-counter" id="counter">1 / 9</span>
    <div class="dots" id="dots"></div>
    <span class="kbd-hint">
      <kbd>←</kbd><kbd>→</kbd> navegar &nbsp;|&nbsp;
      <kbd>+</kbd><kbd>-</kbd> tamaño
    </span>
  </footer>
</div>

<div id="print-area"></div>

<script>
  const FLYERS = [
    { file: 'flyer_novedades.html',            title: 'Lo nuevo que ya tienes' },
    { file: 'flyer_mi_project.html',           title: 'Mi Project — configurado hoy' },
    { file: 'flyer_compromiso.html',           title: 'Mi acción esta semana' },
    { file: 'flyer_prompt_administracion.html', title: 'Prompt base · Administración' },
    { file: 'flyer_prompt_comercial.html',     title: 'Prompt base · Comercial' },
    { file: 'flyer_prompt_diseno.html',        title: 'Prompt base · Diseño' },
    { file: 'flyer_prompt_gerencia.html',      title: 'Prompt base · Gerencia' },
    { file: 'flyer_prompt_marketing.html',     title: 'Prompt base · Marketing' },
    { file: 'flyer_prompt_produccion.html',    title: 'Prompt base · Producción' },
  ];

  let current = 0;
  
  // === CONTROL DE TAMAÑO CON LÍMITES RAZONABLES ===
  const BASE_W = 794;
  const BASE_H = 559;
  let currentScale = 1.0;
  let currentFitMode = true;
  
  const viewer = document.getElementById('viewer');
  const viewerWrap = document.getElementById('viewerWrap');
  const zoomPercentSpan = document.getElementById('zoomPercent');
  
  function updateViewerSize(scale) {
    // 🔥 LÍMITES CORREGIDOS: mínimo 50%, máximo 130% (nada de 250% loco)
    scale = Math.min(1.30, Math.max(0.50, scale));
    currentScale = scale;
    
    const newWrapW = BASE_W * scale;
    const newWrapH = BASE_H * scale;
    viewerWrap.style.width = newWrapW + 'px';
    viewerWrap.style.height = newWrapH + 'px';
    viewer.style.transform = `translate(-50%, -50%) scale(${scale})`;
    zoomPercentSpan.textContent = Math.round(scale * 100) + '%';
  }
  
  function fitToAvailableWidth() {
    const mainEl = document.querySelector('.s-main');
    if (!mainEl) return;
    
    const navTotal = (44 + 28) * 2;
    const availableWidth = mainEl.clientWidth - navTotal - 40;
    let newScale = (availableWidth - 20) / BASE_W;
    
    // Límite más conservador: entre 50% y 110% para ajuste automático
    newScale = Math.min(1.10, Math.max(0.50, newScale));
    updateViewerSize(newScale);
    currentFitMode = true;
  }
  
  function zoomIn() {
    currentFitMode = false;
    let newScale = currentScale + 0.05;  // +5% cada vez, no +12%
    updateViewerSize(newScale);
  }
  
  function zoomOut() {
    currentFitMode = false;
    let newScale = currentScale - 0.05;  // -5% cada vez
    updateViewerSize(newScale);
  }
  
  // === NAVEGACIÓN ===
  const dotsEl = document.getElementById('dots');
  FLYERS.forEach((f, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => showSlide(i);
    dotsEl.appendChild(d);
  });

  const printArea = document.getElementById('print-area');
  FLYERS.forEach(f => {
    const iframe = document.createElement('iframe');
    iframe.src = f.file;
    iframe.style.cssText = 'width:210mm;height:148mm;border:none;display:block;page-break-after:always;';
    printArea.appendChild(iframe);
  });

  function showSlide(n) {
    current = Math.max(0, Math.min(FLYERS.length - 1, n));
    viewer.src = FLYERS[current].file;
    document.getElementById('slideTitle').textContent = FLYERS[current].title;
    document.getElementById('counter').textContent = (current + 1) + ' / ' + FLYERS.length;
    document.getElementById('btnPrev').disabled = current === 0;
    document.getElementById('btnNext').disabled = current === FLYERS.length - 1;
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function navigate(dir) { showSlide(current + dir); }

  function printCurrent() {
    try { viewer.contentWindow.print(); } 
    catch(e) { window.open(FLYERS[current].file, '_blank'); }
  }

  function printAll() {
    const w = window.open('', '_blank');
    if (!w) { alert('Permite ventanas emergentes'); return; }
    const iframeTags = FLYERS.map(f => `<iframe src="${f.file}" style="width:210mm;height:148mm;border:none;page-break-after:always;"></iframe>`).join('\n');
    w.document.write(`<!DOCTYPE html><html><head><style>@page{size:A5 landscape;margin:0;}body{margin:0;}</style></head><body>${iframeTags}</body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 1000);
  }

  // === EVENTOS ===
  document.getElementById('btnZoomIn').onclick = zoomIn;
  document.getElementById('btnZoomOut').onclick = zoomOut;
  document.getElementById('btnMaxFit').onclick = fitToAvailableWidth;
  
  viewer.addEventListener('dblclick', fitToAvailableWidth);
  
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { navigate(1); e.preventDefault(); }
    if (e.key === 'ArrowLeft') { navigate(-1); e.preventDefault(); }
    if (e.key === '+') { zoomIn(); e.preventDefault(); }
    if (e.key === '-') { zoomOut(); e.preventDefault(); }
  });
  
  window.addEventListener('resize', () => { if (currentFitMode) fitToAvailableWidth(); });
  
  // Iniciar
  showSlide(0);
  fitToAvailableWidth();
</script>

</body>
</html>
