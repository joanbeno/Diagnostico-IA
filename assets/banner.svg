<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0d0d1e"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3535cc"/>
      <stop offset="60%" style="stop-color:#8C1C3A"/>
      <stop offset="100%" style="stop-color:#8C1C3A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="340" fill="url(#dots)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent-line)"/>

  <!-- Score indicator — decorative circle -->
  <circle cx="1060" cy="170" r="100" fill="none" stroke="#3535cc" stroke-width="1" opacity="0.15"/>
  <circle cx="1060" cy="170" r="70" fill="none" stroke="#3535cc" stroke-width="1" opacity="0.1"/>
  <circle cx="1060" cy="170" r="40" fill="none" stroke="#8C1C3A" stroke-width="1" opacity="0.2"/>

  <!-- Main title -->
  <text x="80" y="120" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="48" font-weight="700" fill="#f0f0f8" letter-spacing="-0.02em">Diagnóstico de Madurez en IA</text>

  <!-- Subtitle -->
  <text x="80" y="168" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="400" fill="#a8a8c0" letter-spacing="0">ML Studio · Fixoria</text>

  <!-- Divider line -->
  <rect x="80" y="196" width="480" height="2" fill="#3535cc" opacity="0.6"/>

  <!-- Description -->
  <text x="80" y="234" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#6a6a82">Evalúa cómo usa tu equipo la IA.</text>
  <text x="80" y="258" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#6a6a82">Detecta fricciones. Genera un plan accionable.</text>

  <!-- URL badge -->
  <rect x="80" y="286" width="320" height="34" rx="6" fill="#3535cc" opacity="0.15"/>
  <rect x="80" y="286" width="320" height="34" rx="6" fill="none" stroke="#3535cc" stroke-width="1" opacity="0.4"/>
  <text x="240" y="308" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="500" fill="#7b7fff" text-anchor="middle">diagnostico-fixoria.vercel.app</text>

  <!-- Score circle decoration -->
  <text x="1060" y="178" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="36" font-weight="700" fill="#3535cc" opacity="0.5" text-anchor="middle">50</text>
  <text x="1060" y="205" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#6a6a82" text-anchor="middle">PUNTOS</text>
</svg>
