<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0d0d1e"/>
    </linearGradient>
    <linearGradient id="pline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3535cc;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#5a3a88;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8C1C3A;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3535cc;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3535cc;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3535cc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3535cc;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2a80;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#8C1C3A;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8C1C3A;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#8C1C3A;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="c5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8C1C3A;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#8C1C3A;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#pbg)"/>
  <pattern id="pdots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#ffffff" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="260" fill="url(#pdots)"/>

  <text x="600" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#3535cc" opacity="0.7" letter-spacing="0.12em">FLUJO DEL DIAGNÓSTICO</text>

  <rect x="100" y="108" width="1000" height="2" fill="url(#pline)" rx="1"/>

  <!-- Step 1: Formulario 12 pasos -->
  <rect x="52" y="74" width="96" height="72" rx="14" fill="url(#c1)"/>
  <rect x="52" y="74" width="96" height="72" rx="14" fill="none" stroke="#3535cc" stroke-width="1.2" opacity="0.5"/>
  <rect x="84" y="90" width="24" height="3" rx="1.5" fill="#3535cc" opacity="0.8"/>
  <rect x="84" y="97" width="18" height="3" rx="1.5" fill="#3535cc" opacity="0.55"/>
  <rect x="84" y="104" width="21" height="3" rx="1.5" fill="#3535cc" opacity="0.55"/>
  <rect x="84" y="111" width="16" height="3" rx="1.5" fill="#3535cc" opacity="0.4"/>
  <circle cx="68" cy="84" r="9" fill="#3535cc" opacity="0.9"/>
  <text x="68" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#fff">1</text>
  <text x="100" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d0d0f0">Formulario</text>
  <text x="100" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#4a4a7a">12 preguntas</text>

  <!-- Step 2: Envío seguro -->
  <rect x="252" y="74" width="96" height="72" rx="14" fill="url(#c2)"/>
  <rect x="252" y="74" width="96" height="72" rx="14" fill="none" stroke="#3535cc" stroke-width="1.2" opacity="0.4"/>
  <rect x="282" y="91" width="12" height="9" rx="2" fill="none" stroke="#3535cc" stroke-width="1.4" opacity="0.7"/>
  <path d="M282 100 Q288 106 294 100" fill="none" stroke="#3535cc" stroke-width="1.4" opacity="0.5"/>
  <line x1="285" y1="107" x2="291" y2="107" stroke="#3535cc" stroke-width="1.2" opacity="0.5"/>
  <line x1="285" y1="111" x2="289" y2="111" stroke="#3535cc" stroke-width="1.2" opacity="0.35"/>
  <circle cx="268" cy="84" r="9" fill="#3535cc" opacity="0.8"/>
  <text x="268" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#fff">2</text>
  <text x="300" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d0d0f0">API Vercel</text>
  <text x="300" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#4a4a7a">Proxy seguro</text>

  <!-- Step 3: Scoring GAS (center, larger) -->
  <rect x="468" y="62" width="120" height="90" rx="16" fill="url(#c3)"/>
  <rect x="468" y="62" width="120" height="90" rx="16" fill="none" stroke="#6a3a99" stroke-width="1.5" opacity="0.5"/>
  <rect x="516" y="80" width="24" height="18" rx="4" fill="none" stroke="#7a5acc" stroke-width="1.5" opacity="0.7"/>
  <rect x="519" y="84" width="8" height="2" rx="1" fill="#7a5acc" opacity="0.7"/>
  <rect x="519" y="88" width="6" height="2" rx="1" fill="#7a5acc" opacity="0.5"/>
  <circle cx="533" cy="93" r="2" fill="#8C1C3A" opacity="0.9"/>
  <text x="516" y="114" font-family="JetBrains Mono,monospace" font-size="9" fill="#6a5aaa" opacity="0.9">fn()</text>
  <circle cx="484" cy="72" r="9" fill="#6a3a99" opacity="0.85"/>
  <text x="484" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#fff">3</text>
  <text x="528" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d0d0f0">Apps Script</text>
  <text x="528" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#4a4a7a">Scoring server-side</text>

  <!-- Step 4: Perfil + alertas -->
  <rect x="756" y="74" width="96" height="72" rx="14" fill="url(#c4)"/>
  <rect x="756" y="74" width="96" height="72" rx="14" fill="none" stroke="#8C1C3A" stroke-width="1.2" opacity="0.4"/>
  <circle cx="804" cy="96" r="14" fill="none" stroke="#8C1C3A" stroke-width="1.2" opacity="0.5"/>
  <path d="M796,103 Q800,90 804,88 Q808,86 812,96 Q816,106 804,110 Q792,114 796,103" fill="#8C1C3A" opacity="0.15"/>
  <text x="804" y="100" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#c0406a" opacity="0.8">52</text>
  <circle cx="772" cy="84" r="9" fill="#8C1C3A" opacity="0.8"/>
  <text x="772" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#fff">4</text>
  <text x="804" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d0d0f0">Perfil + alertas</text>
  <text x="804" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#6a3a4a">Explorador · Estratega…</text>

  <!-- Step 5: Guía interactiva -->
  <rect x="1052" y="74" width="96" height="72" rx="14" fill="url(#c5)"/>
  <rect x="1052" y="74" width="96" height="72" rx="14" fill="none" stroke="#8C1C3A" stroke-width="1.2" opacity="0.5"/>
  <circle cx="1100" cy="92" r="8" fill="none" stroke="#8C1C3A" stroke-width="1.5" opacity="0.7"/>
  <rect x="1096" y="100" width="8" height="10" rx="1" fill="none" stroke="#8C1C3A" stroke-width="1.5" opacity="0.7"/>
  <rect x="1098" y="104" width="4" height="2" rx="1" fill="#8C1C3A" opacity="0.6"/>
  <circle cx="1068" cy="84" r="9" fill="#8C1C3A" opacity="0.9"/>
  <text x="1068" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#fff">5</text>
  <text x="1100" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d0d0f0">Guía interactiva</text>
  <text x="1100" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#6a3a4a">Código de acceso</text>

  <text x="600" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#2a2a4a" letter-spacing="0.06em">FIXORIA · fixoria.com.co</text>
</svg>
